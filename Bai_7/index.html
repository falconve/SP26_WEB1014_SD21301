<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài 7: Thuộc CSS: display</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Thuộc tính CSS display: Quyết định 
    cách hiển thị của 1 thẻ HTML 
    -->

    <h1 class="the-h1">Thuộc tính Display</h1>
    <div class="hop">Thẻ div</div>
    <span class="the-span">Đây là thẻ span</span>
    <p class="the-p">Đây là thẻ p</p>

    <div class="noi-dung-1">Nội dung 1</div>
    <div class="noi-dung-1">Nội dung 2</div>
    <div class="noi-dung-1">Nội dung 3</div>
    <!-- css cho class noi-dung-1 
    thuộc tính width height là 250px 
    -->

    <!-- Thẻ cha là thẻ div có tên class là container -->
    <div class="container">
      <!-- Các thẻ con sẽ nằm ở đây -->
      <div class="box">Hello 1</div>
      <div class="box">Hello 2</div>
      <div class="box-3">Hello 3</div>
      <div class="box">Hello 4</div>
      <div class="box">Hello 5</div>
    </div>

    <!-- 
    Bài 1: Tạo 1 div chứa 3 box, hiển thị theo hàng ngang và căn giữa theo chiều dọc
    và chiều ngang
    3 box này có các màu sắc khác nhau

    Bài 2: Tạo 1 menu có nội dung là: Trang chủ, Sản Phẩm, Liên hệ theo chiều ngang 
    các phần tử có cách đều
    GỢI Ý: sử dụng ul và li kết hợp với thuộc tính display: flex, justify-content 
    -->
  </body>
</html>
