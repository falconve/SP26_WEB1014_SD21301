<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài 3: Thẻ gom nhóm, tạo form</title>
  </head>
  <body>
    <!-- Thẻ div 
    Tác dụng: 
    - gom nhóm các thẻ html lại với nhau thành 1 khối
    - dùng để tạo bố cục cho trang web
    LƯU Ý: thẻ div gần giống với thẻ p, span nhưng sẽ không có khoảng cách
    -->

    <!-- Logo -->
    <div>
      <p>Logo</p>
      <img
        style="width: 250px; height: 250px"
        src="https://marketplace.canva.com/EAFauoQSZtY/2/0/1600w/canva-brown-mascot-lion-free-logo-kAK-ljYAGXg.jpg"
        alt=""
      />
    </div>

    <!-- Menu -->
    <div>
      <p>Menu</p>
      <ul>
        <li>Trang chủ</li>
        <li>Sản phẩm</li>
        <li>Liên hệ</li>
      </ul>
    </div>

    <div>
      <p>Banner</p>
      <img
        src="https://img.freepik.com/psd-cao-cap/mo-hinh-banner-treo-psd_772836-1366.jpg?semt=ais_hybrid&w=740&q=80"
        alt=""
      />
    </div>

    <div>
      <p>Nội dung chính của website</p>
    </div>
    <div>
      <p>Footer</p>
      <p>Thông tin liên hệ</p>
      <!-- Yêu cầu khi ấn vào thẻ a phải mở tab mới -->
      <!-- Gắn link facebook -->
      <!-- Gắn link google -->
      <!-- Gắn link youtube -->
    </div>
  </body>
</html>
