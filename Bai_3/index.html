<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài 3: Thẻ gom nhóm, tạo form</title>
  </head>
  <body>
    <!-- Thẻ div 
    Tác dụng: 
    - gom nhóm các thẻ html lại với nhau thành 1 khối
    - dùng để tạo bố cục cho trang web
    LƯU Ý: thẻ div gần giống với thẻ p, span nhưng sẽ không có khoảng cách
    -->

    <!-- Logo -->
    <div>
      <p>Logo</p>
      <img
        style="width: 250px; height: 250px"
        src="https://marketplace.canva.com/EAFauoQSZtY/2/0/1600w/canva-brown-mascot-lion-free-logo-kAK-ljYAGXg.jpg"
        alt=""
      />
    </div>

    <!-- Menu -->
    <div>
      <p>Menu</p>
      <ul>
        <li>Trang chủ</li>
        <li>Sản phẩm</li>
        <li>Liên hệ</li>
      </ul>
    </div>

    <div>
      <p>Banner</p>
      <img
        src="https://img.freepik.com/psd-cao-cap/mo-hinh-banner-treo-psd_772836-1366.jpg?semt=ais_hybrid&w=740&q=80"
        alt=""
      />
    </div>

    <div>
      <p>Nội dung chính của website</p>
      <!-- Form
      Form là nơi cho phép người dùng nhập thông tin
      Trong thẻ form sẽ cần phải có thẻ label và thẻ input 
      -->
      <form>
        <!-- Thẻ label là thẻ tiêu đề dành riêng cho cho thẻ input 
         để cho biết người dùng phải nhập gì -->
        <label for="">Họ tên</label>
        <!-- Thẻ input là thẻ cho phép người dùng nhập thông tin -->
        <!-- Thẻ input có thuộc tính type
         Trong thuộc tính type sẽ định dạng kiểu cho input
         Ví dụ 
        -   type="text" => chỉ nhập chữ
        -   type="radio" => lựa chọn 1 trong 2
        -   type="checkbox" => tick vào các ô  
        -   type="password" => dùng cho input nhập mật khẩu
         -->
        <input type="text" />
        <br />
        <label for="">Sở thích </label>
        <input type="checkbox" name="" id="" /><span>Đá bóng</span>
        <input type="checkbox" name="" id="" /><span>Chơi game</span>
        <br />
        <label for="">Giới tính</label>
        <input type="radio" name="gioi-tinh" id="" /><span>Nam</span>
        <input type="radio" name="gioi-tinh" id="" /><span>Nữ</span>
        <br />
        <label for="">Tài Khoản</label>
        <input type="text" />
        <label for="">Mật khẩu</label>
        <input type="password" name="" id="" />
        <!-- Thẻ button để tạo nút  -->
        <button>Đăng ký</button>
        <!-- type:submit dùng để submit form (hay gửi form) -->
        <input type="submit" value="Đăng ký" />
      </form>
      <!-- Tạo 1 form để lấy thông tin
      1. Mã sinh viên 
      2. Họ tên
      3. Lớp
      4. Các môn đang học: WEB1014, MOB1024, COM2r014, COM2035 (tick)
      5. Giới tính 
      6. Nút gửi thông tin
      -->
    </div>
    <div>
      <p>Footer</p>
      <p>Thông tin liên hệ</p>
      <!-- Yêu cầu khi ấn vào thẻ a phải mở tab mới -->
      <!-- Gắn link facebook -->
      <a href="https://facebook.com" target="_blank">Facebook</a>
      <!-- Gắn link google -->
      <a href="https://google.com" target="_blank">Google</a>
      <!-- Gắn link youtube -->
      <a href="https://youtube.com" target="_blank">Youtube</a>
    </div>
  </body>
</html>
