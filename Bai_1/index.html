<!-- Cấu tạo của 1 website thì sẽ gồm từ nhiều các thẻ html -->
<!-- Cấu trúc 1 file html -->
<!-- Các thẻ html sẽ có cấu trúc <tên-thẻ-mở>Nội dung của thẻ</tên-thẻ-đóng> -->
<!doctype html>
<html lang="en">
  <!-- Thẻ <head></head> chứa thông tin của website -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Thẻ <title></title> dùng để chứa tên của website -->
    <title>Đây là website của Tuấn Anh</title>
  </head>
  <!-- Nội dung của website sẽ nằm toàn bộ ở thẻ body
  Các thẻ nằm trong thẻ body sẽ được hiển thị lên trên web 
  -->
  <body>
    <!-- Cụm thẻ tiêu đề: nội dung sẽ được in đậm -->
    <!-- Gồm từ thẻ h1 cho tới h6 -->
    <!-- Viết tên của các bạn vào thẻ h1 -->
    <h1>Tuấn Anh</h1>
    <!-- Viết mã số sinh viên vào thẻ h2 -->
    <h2>PP00001</h2>
    <!-- Viết trường đang học vào thẻ h3 -->
    <!-- Viết quê quán vào thẻ h4 -->
    <!-- viết địa chỉ đang ở vào thẻ h5 -->
    <!-- viết số điện thoại vào thẻ h6 -->

    <!-- Cụm các thẻ văn bản -->
    <!-- Thẻ chứa các đoạn văn bản -->
    <!-- Lưu ý: thẻ p sẽ tự động xuống dòng -->
    <p>Hôm nay là thứ 5, tôi đang đi học</p>
    <p>tại trường cao đẳng FPT POLY</p>
    <!-- Thẻ chứa văn bản nhưng cùng dòng -->
    <span>Tuần này tôi </span>
    <span>sắp thi</span>
    <!-- Thẻ xuống dòng -->
    <!-- Thẻ br không có thẻ đóng -->
    <br />
    <span>Hải Phòng</span>
    <span>thành phố Cảng</span>
    <!-- Thẻ in đậm, in nghiêng, gạch ngang, gạch chân -->
    <!-- Thẻ in đậm: <b></b> -->
    <p>Đây là đoạn văn bản <b>in đậm</b></p>
    <!-- Thẻ in nghiêng: <i></i> -->
    <p>Đây là thẻ <i>in nghiêng</i></p>
    <!-- Thẻ gạch chân: <u></u> -->
    <p>Đoạn văn bản này được <u>gạch chân</u></p>
    <!-- Thẻ gạch ngang qua chữ: <del></del> -->
    <p><del>SALE</del></p>
    <!-- Thẻ highlight: <mark></mark> nền của văn bản sẽ có màu vàng -->
    <p>Nhấn mạnh <mark>nổi bật</mark></p>
  </body>
</html>
